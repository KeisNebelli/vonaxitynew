<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1D4ED8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Antenna stem -->
  <line x1="50" y1="14" x2="50" y2="24" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Antenna glow dot -->
  <circle cx="50" cy="10" r="5" fill="#A5F3FC" opacity="0.95"/>
  <circle cx="50" cy="10" r="3" fill="white"/>
  <circle cx="50" cy="10" r="6" fill="none" stroke="rgba(165,243,252,0.5)" stroke-width="1.5"/>

  <!-- Ear panels (left) -->
  <rect x="18" y="33" width="8" height="14" rx="4" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <rect x="20" y="37" width="4" height="6" rx="2" fill="#DBEAFE"/>

  <!-- Ear panels (right) -->
  <rect x="74" y="33" width="8" height="14" rx="4" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <rect x="76" y="37" width="4" height="6" rx="2" fill="#DBEAFE"/>

  <!-- Robot head -->
  <rect x="25" y="23" width="50" height="42" rx="13" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Face visor / screen -->
  <rect x="30" y="28" width="40" height="27" rx="9" fill="#EFF6FF"/>
  <rect x="30" y="28" width="40" height="27" rx="9" fill="none" stroke="#DBEAFE" stroke-width="1"/>

  <!-- Left eye -->
  <circle cx="40" cy="40" r="6" fill="#2563EB"/>
  <circle cx="40" cy="40" r="4" fill="#1D4ED8"/>
  <circle cx="38" cy="38" r="2" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <circle cx="60" cy="40" r="6" fill="#2563EB"/>
  <circle cx="60" cy="40" r="4" fill="#1D4ED8"/>
  <circle cx="58" cy="38" r="2" fill="white" opacity="0.7"/>

  <!-- Smile -->
  <path d="M 41 50 Q 50 57 59 50" stroke="#2563EB" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush dots -->
  <circle cx="34" cy="47" r="3" fill="#FCA5A5" opacity="0.5"/>
  <circle cx="66" cy="47" r="3" fill="#FCA5A5" opacity="0.5"/>

  <!-- Neck connector -->
  <rect x="44" y="65" width="12" height="6" rx="3" fill="rgba(255,255,255,0.85)"/>

  <!-- Chest / body -->
  <rect x="27" y="71" width="46" height="22" rx="10" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Medical cross on chest -->
  <rect x="47.5" y="75" width="5" height="14" rx="2" fill="#EF4444" opacity="0.85"/>
  <rect x="43" y="79.5" width="14" height="5" rx="2" fill="#EF4444" opacity="0.85"/>

  <!-- Small chest panel line details -->
  <rect x="29" y="85" width="10" height="3" rx="1.5" fill="#DBEAFE" opacity="0.6"/>
  <rect x="61" y="85" width="10" height="3" rx="1.5" fill="#DBEAFE" opacity="0.6"/>
</svg>
